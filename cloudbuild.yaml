availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/dockerhub-username/versions/latest
      env: DOCKERHUB_USERNAME
    - versionName: projects/$PROJECT_ID/secrets/dockerhub-token/versions/latest
      env: DOCKERHUB_TOKEN

steps:
  - name: 'gcr.io/cloud-builders/docker'
    id: 'docker-login'
    entrypoint: 'bash'
    args:
      - '-c'
      - 'docker login -u $$DOCKERHUB_USERNAME -p $$DOCKERHUB_TOKEN'
    secretEnv: ['DOCKERHUB_USERNAME', 'DOCKERHUB_TOKEN']

  - name: 'gcr.io/cloud-builders/docker'
    id: 'docker-build'
    entrypoint: 'bash'
    args:
      - '-c'
      - 'docker build -t $$DOCKERHUB_USERNAME/nagp-api:v1 ./app'
    secretEnv: ['DOCKERHUB_USERNAME']
    waitFor:
      - 'docker-login'

  - name: 'gcr.io/cloud-builders/docker'
    id: 'docker-push'
    entrypoint: 'bash'
    args:
      - '-c'
      - 'docker push $$DOCKERHUB_USERNAME/nagp-api:v1'
    secretEnv: ['DOCKERHUB_USERNAME']
    waitFor:
      - 'docker-build'